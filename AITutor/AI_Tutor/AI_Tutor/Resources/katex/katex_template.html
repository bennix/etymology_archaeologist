<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="stylesheet" href="katex.min.css">
<script src="marked.min.js"></script>
<script src="katex.min.js"></script>
<script src="auto-render.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    padding: 12px 14px;
    margin: 0;
    color: #1c1c1e;
    background: transparent;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  @media (prefers-color-scheme: dark) {
    body { color: #f2f2f7; }
    table th { background: #2c2c2e; }
    code { background: #2c2c2e; }
    pre { background: #1c1c1e; border: 1px solid #3a3a3c; }
  }
  table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 14px; }
  th, td { border: 1px solid #d1d1d6; padding: 7px 10px; text-align: left; }
  th { background: #f2f2f7; font-weight: 600; }
  code { background: #f2f2f7; padding: 2px 6px; border-radius: 5px; font-size: 13px; font-family: 'Menlo', monospace; }
  pre { background: #f2f2f7; padding: 12px; border-radius: 10px; overflow-x: auto; }
  pre code { background: none; padding: 0; }
  blockquote { border-left: 3px solid #c7c7cc; margin: 8px 0; padding: 4px 12px; color: #6c6c70; }
  h1, h2, h3 { margin: 16px 0 8px; }
  h1 { font-size: 20px; }
  h2 { font-size: 17px; }
  h3 { font-size: 15px; }
  p { margin: 8px 0; }
  ul, ol { padding-left: 20px; margin: 8px 0; }
  .katex-display { overflow-x: auto; overflow-y: hidden; }
  .katex { font-size: 1.05em; }
  .cursor { display: inline-block; width: 2px; height: 1em; background: #007aff; animation: blink 1s step-end infinite; vertical-align: text-bottom; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="content">CONTENT_PLACEHOLDER</div>
<script>
  function renderContent(rawText) {
    // Parse markdown
    marked.setOptions({ breaks: true, gfm: true });
    var html = marked.parse(rawText);
    document.getElementById('content').innerHTML = html;
    // Render KaTeX
    renderMathInElement(document.getElementById('content'), {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false},
        {left: '\\[', right: '\\]', display: true},
        {left: '\\(', right: '\\)', display: false}
      ],
      throwOnError: false
    });
  }
  // Initial render
  var initialContent = document.getElementById('content').textContent;
  renderContent(initialContent);

  // Expose for JS injection
  window.updateContent = function(text) {
    renderContent(text);
    // Report height
    setTimeout(function() {
      window.webkit && window.webkit.messageHandlers &&
      window.webkit.messageHandlers.heightChanged &&
      window.webkit.messageHandlers.heightChanged.postMessage(document.body.scrollHeight);
    }, 100);
  };

  // Report initial height
  setTimeout(function() {
    window.webkit && window.webkit.messageHandlers &&
    window.webkit.messageHandlers.heightChanged &&
    window.webkit.messageHandlers.heightChanged.postMessage(document.body.scrollHeight);
  }, 300);
</script>
</body>
</html>
